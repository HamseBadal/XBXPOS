<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>XBX Online POS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<style>
:root{
  --bg:#0f1320; --bg2:#161b2c; --card:#1b2236; --card2:#212a42;
  --line:#2a3350; --txt:#eef1fb; --txt2:#9aa4c4; --muted:#6c7798;
  --accent:#ff7a45; --accent2:#ffb443; --good:#3ddc97; --bad:#ff5d6c; --info:#5da9ff;
  --radius:16px; --shadow:0 10px 30px rgba(0,0,0,.35);
  --font: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
}
[data-theme="light"]{
  --bg:#f3f4fa; --bg2:#ffffff; --card:#ffffff; --card2:#f6f7fc;
  --line:#e3e6f3; --txt:#1c2238; --txt2:#5b6481; --muted:#8890ab;
  --shadow:0 10px 30px rgba(40,50,90,.08);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:var(--font); background:var(--bg); color:var(--txt); min-height:100vh; transition:.25s;}
img{max-width:100%; display:block;}
button{font-family:inherit; cursor:pointer; border:none;}
input,select,textarea{font-family:inherit; background:var(--card2); border:1px solid var(--line); color:var(--txt); border-radius:10px; padding:11px 13px; font-size:14.5px; outline:none; width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
.hidden{display:none !important;}

/* ---------- LOGIN ---------- */
#loginScreen{min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 30% 20%, #2a1f3d, #0f1320 60%); padding:20px;}
.loginCard{background:var(--card); border:1px solid var(--line); border-radius:22px; padding:36px 30px; width:100%; max-width:380px; box-shadow:var(--shadow); text-align:center;}
.loginCard img{width:78px; height:78px; border-radius:20px; margin:0 auto 14px; object-fit:cover;}
.loginCard h1{font-size:22px; margin-bottom:2px; letter-spacing:.5px;}
.loginCard p{color:var(--txt2); font-size:13px; margin-bottom:24px;}
.loginCard input{margin-bottom:12px;}
.loginCard .err{color:var(--bad); font-size:13px; min-height:18px; margin-bottom:8px;}
.btn{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#1a1208; font-weight:700; padding:12px; border-radius:12px; width:100%; font-size:15px; letter-spacing:.3px;}
.btn:active{transform:scale(.98);}
.btn-outline{background:transparent; border:1px solid var(--line); color:var(--txt); font-weight:600;}
.btn-sm{padding:8px 12px; font-size:13px; border-radius:9px; width:auto;}
.btn-danger{background:var(--bad); color:#fff;}
.btn-good{background:var(--good); color:#063;}
.btn-info{background:var(--info); color:#062b52;}

/* ---------- APP SHELL ---------- */
#app{display:none; min-height:100vh;}
#app.show{display:flex;}
.sidebar{width:240px; background:var(--bg2); border-right:1px solid var(--line); padding:18px 14px; position:sticky; top:0; height:100vh; overflow-y:auto; flex-shrink:0; transition:.2s;}
.sidebar .brand{display:flex; align-items:center; gap:10px; padding:6px 8px 18px;}
.sidebar .brand img{width:38px; height:38px; border-radius:10px;}
.sidebar .brand b{font-size:15px;}
.sidebar .brand span{display:block; font-size:10.5px; color:var(--txt2);}
.navitem{display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:11px; color:var(--txt2); font-size:14px; font-weight:600; margin-bottom:3px; cursor:pointer; transition:.15s;}
.navitem:hover{background:var(--card2); color:var(--txt);}
.navitem.active{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#1a1208;}
.navitem .ic{width:20px; text-align:center;}
.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-bottom:1px solid var(--line); background:var(--bg2); position:sticky; top:0; z-index:5; flex-wrap:wrap; gap:10px;}
.topbar h2{font-size:18px;}
.topbar .who{font-size:12.5px; color:var(--txt2);}
.iconbtn{background:var(--card2); border:1px solid var(--line); width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:16px;}
.content{padding:22px; flex:1; overflow-y:auto;}

/* mobile bottom nav + drawer */
.mobileTop{display:none;}
.overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:20;}
@media(max-width:880px){
  .sidebar{position:fixed; left:-260px; z-index:30; box-shadow:var(--shadow);}
  .sidebar.open{left:0;}
  .overlay.open{display:block;}
  .mobileTop{display:flex;}
}

/* ---------- COMPONENTS ---------- */
.grid{display:grid; gap:16px;}
.cards4{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow);}
.stat .lbl{font-size:12.5px; color:var(--txt2); display:flex; align-items:center; gap:6px; margin-bottom:8px;}
.stat .val{font-size:24px; font-weight:800;}
.stat .sub{font-size:11.5px; color:var(--muted); margin-top:4px;}
.row{display:flex; gap:14px; flex-wrap:wrap; align-items:center;}
.row.between{justify-content:space-between;}
.section-title{font-size:15px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px;}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th,td{text-align:left; padding:10px 8px; border-bottom:1px solid var(--line); white-space:nowrap;}
th{color:var(--txt2); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.4px;}
tbody tr:hover{background:var(--card2);}
.tablewrap{overflow-x:auto;}
.badge{padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700;}
.badge.ok{background:rgba(61,220,151,.15); color:var(--good);}
.badge.warn{background:rgba(255,180,67,.15); color:var(--accent2);}
.badge.bad{background:rgba(255,93,108,.15); color:var(--bad);}
.modalBg{display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:50; align-items:flex-start; justify-content:center; overflow-y:auto; padding:30px 14px;}
.modalBg.open{display:flex;}
.modal{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:24px; width:100%; max-width:500px; box-shadow:var(--shadow);}
.modal h3{margin-bottom:16px; font-size:17px;}
.field{margin-bottom:13px;}
.field label{display:block; font-size:12.5px; color:var(--txt2); margin-bottom:5px; font-weight:600;}
.formgrid{display:grid; grid-template-columns:1fr 1fr; gap:13px;}
@media(max-width:520px){.formgrid{grid-template-columns:1fr;}}
.imgPick{display:flex; align-items:center; gap:12px;}
.imgPick img{width:60px; height:60px; object-fit:cover; border-radius:10px; border:1px solid var(--line); background:var(--card2);}
.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--good); color:#063; padding:12px 20px; border-radius:12px; font-weight:700; font-size:13.5px; z-index:99; box-shadow:var(--shadow); display:none;}
.prodCard{background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; cursor:pointer; transition:.15s;}
.prodCard:hover{border-color:var(--accent);}
.prodCard .ph{width:100%; height:90px; object-fit:cover; background:var(--card2);}
.prodCard .pb{padding:9px 10px;}
.prodCard .pn{font-size:12.5px; font-weight:700; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.prodCard .pp{font-size:13px; color:var(--accent2); font-weight:700;}
.prodCard .ps{font-size:10.5px; color:var(--muted);}
.cartRow{display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px;}
.cartRow .ci{flex:1; min-width:0;}
.qtybtn{width:24px; height:24px; border-radius:6px; background:var(--card2); border:1px solid var(--line); color:var(--txt);}
.chip{display:inline-block; padding:6px 14px; border-radius:20px; background:var(--card2); border:1px solid var(--line); font-size:12.5px; font-weight:600; cursor:pointer; margin:0 6px 6px 0;}
.chip.active{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#1a1208; border-color:transparent;}
.empty{text-align:center; color:var(--muted); padding:40px 10px; font-size:13.5px;}
.actions{display:flex; gap:6px; flex-wrap:wrap;}
::-webkit-scrollbar{width:8px; height:8px;} ::-webkit-scrollbar-thumb{background:var(--line); border-radius:10px;}
.sync-status{font-size:12px; color:var(--txt2); display:flex; align-items:center; gap:6px;}
.sync-status .online{color:var(--good);}
.sync-status .offline{color:var(--bad);}
.sync-status .syncing{color:var(--accent2);}
.folder-check{font-size:12px; padding:6px 12px; border-radius:8px; background:var(--card2); display:inline-flex; align-items:center; gap:8px;}
.folder-check.ok{color:var(--good); border:1px solid var(--good);}
.folder-check.bad{color:var(--bad); border:1px solid var(--bad);}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen">
  <div class="loginCard">
    <img src="https://i.postimg.cc/Qx0p2GVk/file-00000000fa4c7246b72a6a8cfb5f877e.png" alt="logo">
    <h1>XBX Online POS</h1>
    <p>Multi-Store Inventory &amp; Point of Sale</p>
    <div class="field" style="text-align:left">
      <label>Username</label>
      <input id="liUser" placeholder="Username" value="admin">
    </div>
    <div class="field" style="text-align:left">
      <label>Password</label>
      <input id="liPass" type="password" placeholder="Password" value="admin123">
    </div>

    <button class="btn" onclick="doLogin()">Login</button>
    <p style="margin-top:16px; font-size:11.5px; color:var(--muted)">Default Admin: admin / admin123</p>

</div>

<!-- ============ APP ============ -->
<div id="app">
  <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="row" style="gap:10px">

        <div>
          <h2 id="pageTitle">Dashboard</h2>

</div>

<div class="modalBg" id="modalBg"><div class="modal" id="modalBox"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ============================= GOOGLE DRIVE SYNC ============================= */
const CLIENT_ID = '1095831268065-rr7gk8t9uqbhb9dohvq02thm6r98364h.apps.googleusercontent.com';
const API_KEY = 'AIzaSyDp0mZvQlY7-pUq96DBaAAKfYXYaRPITGw';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const DB_FILE_NAME = 'xbx_pos_db.json';

let driveSync = {
  initialized: false,
  token: null,
  online: false,
  syncing: false,
  fileId: null,
  folderId: null
};

function getFolderId() {
  // Use folder from settings or default
  let folder = DB.settings.driveFolderId || '1rhEnLldnxkFqnsF2lajpdHFX62S4Dfms';
  driveSync.folderId = folder;
  return folder;
}

function initDriveAPI() {
  return new Promise((resolve) => {
    if (driveSync.initialized) { resolve(); return; }
    gapi.load('client:auth2', function() {
      gapi.client.init({
        apiKey: API_KEY,
        clientId: CLIENT_ID,
        scope: SCOPES,
        discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
      }).then(() => {
        driveSync.initialized = true;
        getFolderId();
        const auth = gapi.auth2.getAuthInstance();
        if (auth.isSignedIn.get()) {
          driveSync.token = auth.currentUser.get().getAuthResponse().access_token;
          driveSync.online = true;
          updateSyncStatus('online', 'Connected');
          checkFolderAccess();
        } else {
          driveSync.online = false;
          updateSyncStatus('offline', 'Sign in to sync');
        }
        resolve();
      }).catch(err => {
        console.error('Drive init error:', err);
        driveSync.online = false;
        updateSyncStatus('offline', 'Error');
        resolve();
      });
    });
  });
}

function updateSyncStatus(status, text) {
  const el = document.getElementById('syncStatus');
  const txt = document.getElementById('syncText');
  if (el) {
    el.className = 'sync-status';
    if (status === 'online') el.classList.add('online');
    else if (status === 'offline') el.classList.add('offline');
    else if (status === 'syncing') el.classList.add('syncing');
  }
  if (txt) txt.textContent = text;
}

function signInToDrive() {
  const auth = gapi.auth2.getAuthInstance();
  auth.signIn().then(() => {
    driveSync.token = auth.currentUser.get().getAuthResponse().access_token;
    driveSync.online = true;
    updateSyncStatus('online', 'Connected');
    toast('Signed in to Google Drive');
    checkFolderAccess();
    loadFromDrive().then(() => {
      syncNow();
    });
  }).catch(err => {
    toast('Failed to sign in: ' + err.message);
  });
}

async function checkFolderAccess() {
  try {
    const resp = await gapi.client.drive.files.get({
      fileId: getFolderId(),
      fields: 'id,name'
    });
    const folder = resp.result;
    if (folder && folder.id) {
      toast('✅ Folder found: ' + folder.name);
      return true;
    }
  } catch(e) {
    toast('⚠️ Folder not found or no access. Check Folder ID.');
    console.error('Folder check error:', e);
    return false;
  }
}

async function syncNow() {
  if (driveSync.syncing) {
    toast('Sync already in progress');
    return;
  }
  if (!driveSync.online || !driveSync.token) {
    signInToDrive();
    return;
  }
  
  // Check folder access first
  const hasAccess = await checkFolderAccess();
  if (!hasAccess) {
    toast('⚠️ Cannot access folder. Please check Folder ID');
    return;
  }
  
  driveSync.syncing = true;
  updateSyncStatus('syncing', 'Syncing...');
  
  try {
    await uploadDBToDrive();
    driveSync.syncing = false;
    updateSyncStatus('online', 'Synced ✓');
    toast('Data synced to Google Drive');
  } catch(err) {
    driveSync.syncing = false;
    updateSyncStatus('offline', 'Sync failed');
    toast('Sync failed: ' + err.message);
    console.error('Sync error:', err);
  }
}

async function findDBFile() {
  try {
    const folderId = getFolderId();
    const resp = await gapi.client.drive.files.list({
      q: `name='${DB_FILE_NAME}' and '${folderId}' in parents and trashed=false`,
      fields: 'files(id,name,version)',
      pageSize: 1
    });
    const files = resp.result.files;
    return files && files.length > 0 ? files[0] : null;
  } catch(e) {
    console.error('Find file error:', e);
    return null;
  }
}

async function uploadDBToDrive() {
  const data = JSON.stringify(DB);
  const blob = new Blob([data], { type: 'application/json' });
  const folderId = getFolderId();
  
  // Find existing file
  const existing = await findDBFile();
  
  if (existing) {
    // Update existing file
    driveSync.fileId = existing.id;
    const formData = new FormData();
    formData.append('metadata', new Blob([JSON.stringify({})], { type: 'application/json' }));
    formData.append('file', blob);
    
    const resp = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=multipart`, {
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + driveSync.token },
      body: formData
    });
    if (!resp.ok) {
      const err = await resp.text();
      throw new Error('Upload failed: ' + err);
    }
  } else {
    // Create new file
    const metadata = {
      name: DB_FILE_NAME,
      parents: [folderId],
      mimeType: 'application/json'
    };
    const formData = new FormData();
    formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
    formData.append('file', blob);
    
    const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + driveSync.token },
      body: formData
    });
    if (!resp.ok) {
      const err = await resp.text();
      throw new Error('Create failed: ' + err);
    }
    const result = await resp.json();
    driveSync.fileId = result.id;
  }
  return true;
}

async function loadFromDrive() {
  if (!driveSync.online || !driveSync.token) {
    return false;
  }
  try {
    const folderId = getFolderId();
    // Check folder access first
    try {
      await gapi.client.drive.files.get({ fileId: folderId, fields: 'id' });
    } catch(e) {
      console.log('Folder not accessible:', folderId);
      return false;
    }
    
    const file = await findDBFile();
    if (!file) {
      console.log('No existing DB file found in Drive');
      return false;
    }
    driveSync.fileId = file.id;
    
    const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
      headers: { 'Authorization': 'Bearer ' + driveSync.token }
    });
    if (!resp.ok) throw new Error('Download failed');
    const data = await resp.text();
    const remoteDB = JSON.parse(data);
    
    // Merge: Use remote if it has newer version or if local is empty
    const localVersion = localStorage.getItem('xbx_pos_db_version') || '0';
    const remoteVersion = remoteDB._version || '0';
    
    if (remoteVersion > localVersion || !localStorage.getItem(DB_KEY)) {
      DB = remoteDB;
      localStorage.setItem(DB_KEY, JSON.stringify(DB));
      localStorage.setItem('xbx_pos_db_version', remoteVersion);
      toast('Loaded latest data from Drive');
      return true;
    }
    return false;
  } catch(e) {
    console.error('Load from Drive error:', e);
    return false;
  }
}

// Auto-sync function - called after every save
let syncTimeout = null;
function autoSyncToDrive() {
  if (syncTimeout) clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => {
    if (driveSync.online && !driveSync.syncing) {
      uploadDBToDrive().catch(() => {});
    }
  }, 2000);
}

/* ============================= DB (localStorage) ============================= */
const DB_KEY='xbx_pos_db_v1';
function defaultDB(){
  return {
    _version: Date.now().toString(),
    settings:{ whatsapp:'', usdRate:130, theme:'dark', refreshTypes:['Lunch','Tea','Transport','Office Supplies','Other'], driveFolderId:'1rhEnLldnxkFqnsF2lajpdHFX62S4Dfms' },
    stores:[{id:gid(),name:'Main Store',code:'STR-001',location:'Hargeisa',phone:'',email:'',manager:'',active:true}],
    categories:['Beverages','Snacks','Groceries','Electronics','Other'],
    products:[],
    buyProducts:[],
    users:[{id:gid(),username:'Admin',password:'admin123',fullName:'Administrator',role:'Admin',stores:[],photo:'',active:true}],
    sales:[],
    transfers:[],
    creditCustomers:[],
    debits:[],
    returns:[],
    refreshments:[]
  };
}
function gid(){return 'id'+Date.now()+Math.random().toString(36).slice(2,7);}
let DB = JSON.parse(localStorage.getItem(DB_KEY) || 'null') || defaultDB();
function save(){ 
  DB._version = Date.now().toString();
  localStorage.setItem(DB_KEY, JSON.stringify(DB));
  localStorage.setItem('xbx_pos_db_version', DB._version);
  // Auto sync to Drive
  autoSyncToDrive();
}

/* ============================= STATE ============================= */
let SESSION = JSON.parse(sessionStorage.getItem('xbx_session')||'null');
let currency = 'ETB';
let cart = [];

/* ============================= UTIL ============================= */
function toast(msg){const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; clearTimeout(window._tt); window._tt=setTimeout(()=>t.style.display='none',3200);}
function fmt(n){ n = n||0; if(currency==='USD'){ return '$'+(n/DB.settings.usdRate).toFixed(2);} return n.toLocaleString(undefined,{maximumFractionDigits:0})+' ETB';}
function todayStr(){return new Date().toISOString().slice(0,10);}
function monthStr(){return new Date().toISOString().slice(0,7);}
function yearStr(){return new Date().getFullYear().toString();}
function fileToBase64(file,cb){ const r=new FileReader(); r.onload=()=>cb(r.result); r.readAsDataURL(file); }
function escapeHtml(s){return (s||'').toString().replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}

/* ============================= AUTH ============================= */
function doLogin(){
  const u=document.getElementById('liUser').value.trim();
  const p=document.getElementById('liPass').value;
  const user = DB.users.find(x=>x.username.toLowerCase()===u.toLowerCase() && x.password===p);
  if(!user){ document.getElementById('liErr').textContent='Username ama Password khalad ah.'; return;}
  if(user.active===false){ document.getElementById('liErr').textContent='Account-kan waa la deactivate gareeyay.'; return;}
  SESSION = {id:user.id, username:user.username, role:user.role, fullName:user.fullName, stores:user.stores||[]};
  sessionStorage.setItem('xbx_session', JSON.stringify(SESSION));
  document.getElementById('liErr').textContent='';
  enterApp();
}
function logout(){ sessionStorage.removeItem('xbx_session'); SESSION=null; location.reload(); }

/* ============================= NAV CONFIG ============================= */
const NAV = {
  Admin:[ ['dashboard','📊','Dashboard'],['sell','🛒','Sell Now'],['todaysell','📅','Today Sell'],['products','📦','Product'],
    ['buyproduct','🧾','Buy Product'],['categories','🏷️','Categories'],['refreshment','☕','Refreshment'],['users','👤','Users'],
    ['stores','🏬','Stores'],['transfers','🔁','Transfers'],['credit','💳','Credit Customers'],['debit','📥','Debit'],

let chartRefs=[];
function RENDER_dashboard(){
  const ids = myStoreIds();
  const sales = DB.sales.filter(s=>ids.includes(s.storeId));
  const sumWhere = (arr,fn)=>arr.reduce((a,b)=>a+fn(b),0);
  const today = sales.filter(s=>s.date.slice(0,10)===todayStr());
  const month = sales.filter(s=>s.date.slice(0,7)===monthStr());
  const year = sales.filter(s=>s.date.slice(0,4)===yearStr());
  const profitOf = s => s.items.reduce((a,it)=>a+( (it.sellPrice-it.costPrice)*it.qty ),0) - (s.discount||0);
  const totalProfit = sumWhere(sales, profitOf);
  const stockVal = DB.products.filter(p=>ids.includes(p.storeId)).reduce((a,p)=>a+p.costPrice*p.stock,0);
  const totalDebt = DB.creditCustomers.filter(c=>ids.includes(c.storeId)).reduce((a,c)=>a+(c.remaining||0),0);
  const totalReturns = DB.returns.filter(r=>ids.includes(r.storeId)).length;

  document.getElementById('content').innerHTML = `
  <div class="row between" style="margin-bottom:16px">
    <div></div>
    <div class="chip ${currency==='ETB'?'active':''}" onclick="currency='ETB'; RENDER_dashboard();">ETB</div>
    <div class="chip ${currency==='USD'?'active':''}" onclick="currency='USD'; RENDER_dashboard();" style="margin-right:0">USD</div>
  </div>
  <div class="grid cards4">
    ${stat('📈','Total Profit',fmt(totalProfit))}
    ${stat('🔄','Returns',totalReturns)}
    ${stat('👥','Debts',fmt(totalDebt))}
    ${stat('📦','Stock Value',fmt(stockVal))}
    ${stat('📅','Today Sales',fmt(sumWhere(today,s=>s.total)))}
    ${stat('📅','Today Profit',fmt(sumWhere(today,profitOf)))}
    ${stat('📆','Month Sales',fmt(sumWhere(month,s=>s.total)))}
    ${stat('📆','Month Profit',fmt(sumWhere(month,profitOf)))}
    ${stat('📆','Year Sales',fmt(sumWhere(year,s=>s.total)))}
    ${stat('📆','Year Profit',fmt(sumWhere(year,profitOf)))}
  </div>
  <div class="grid" style="grid-template-columns:2fr 1fr; margin-top:18px">
    <div class="card"><div class="section-title">Sales — Last 7 Days</div><canvas id="ch1" height="140"></canvas></div>
    <div class="card"><div class="section-title">Payment Methods</div><canvas id="ch2" height="140"></canvas></div>
  </div>`;

  chartRefs.forEach(c=>c.destroy()); chartRefs=[];
  const days=[...Array(7)].map((_,i)=>{const d=new Date(); d.setDate(d.getDate()-(6-i)); return d.toISOString().slice(0,10);});
  const dayTotals = days.map(d=> sumWhere(sales.filter(s=>s.date.slice(0,10)===d), s=>s.total));
  const ctx1=document.getElementById('ch1');
  chartRefs.push(new Chart(ctx1,{type:'line',data:{labels:days.map(d=>d.slice(5)),datasets:[{label:'Sales',data:dayTotals,borderColor:'#ff7a45',backgroundColor:'rgba(255,122,69,.15)',fill:true,tension:.35}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}}));
  const pmCounts={}; sales.forEach(s=>{pmCounts[s.payMethod]=(pmCounts[s.payMethod]||0)+1;});
  const ctx2=document.getElementById('ch2');
  chartRefs.push(new Chart(ctx2,{type:'doughnut',data:{labels:Object.keys(pmCounts).length?Object.keys(pmCounts):['No data'],datasets:[{data:Object.keys(pmCounts).length?Object.values(pmCounts):[1],backgroundColor:['#ff7a45','#ffb443','#5da9ff','#3ddc97','#ff5d6c','#9b8cff']}]},options:{plugins:{legend:{position:'bottom',labels:{boxWidth:10}}}}}));
}
function stat(ic,lbl,val,sub){ return `<div class="card stat"><div class="lbl">${ic} ${lbl}</div><div class="val">${val}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`; }

  if(cat) prods=prods.filter(p=>p.category===cat);
  if(storeF) prods=prods.filter(p=>p.storeId===storeF);
  document.getElementById('sellGrid').innerHTML = prods.length? prods.map(p=>`
    <div class="prodCard" onclick="addToCart('${p.id}')">
      <img class="ph" src="${p.image||placeholderImg()}">
      <div class="pb"><div class="pn">${escapeHtml(p.name)}</div><div class="pp">${fmt(p.sellPrice)}</div><div class="ps">Stock: ${p.stock} • ${storeName(p.storeId)}</div></div>
    </div>`).join('') : '<div class="empty">No products found</div>';
}
function addToCart(pid){
  const p=DB.products.find(x=>x.id===pid);
  const c = cart.find(x=>x.productId===pid);
  if(c){ if(c.qty<p.stock) c.qty++; else toast('Stock max reached'); }
  else cart.push({productId:pid,name:p.name,sellPrice:p.sellPrice,costPrice:p.costPrice,storeId:p.storeId,qty:1,image:p.image});
  document.getElementById('cartBox').innerHTML = renderCart(); updateCartTotals();
}
function renderCart(){
  if(!cart.length) return '<div class="empty">Cart is empty</div>';
  return cart.map((c,i)=>`<div class="cartRow"><img src="${c.image||placeholderImg()}" style="width:32px;height:32px;border-radius:6px;object-fit:cover">
  <div class="ci">${escapeHtml(c.name)}<br><span style="color:var(--muted)">${fmt(c.sellPrice)}</span></div>
  <button class="qtybtn" onclick="cartQty(${i},-1)">−</button><span>${c.qty}</span><button class="qtybtn" onclick="cartQty(${i},1)">+</button>
  <button class="qtybtn" onclick="cartRemove(${i})" style="color:var(--bad)">✕</button></div>`).join('');
}
function cartQty(i,d){ cart[i].qty+=d; if(cart[i].qty<=0) cart.splice(i,1); document.getElementById('cartBox').innerHTML=renderCart(); updateCartTotals(); }
function cartRemove(i){ cart.splice(i,1); document.getElementById('cartBox').innerHTML=renderCart(); updateCartTotals(); }
function updateCartTotals(){
  const sub=cart.reduce((a,c)=>a+c.sellPrice*c.qty,0);
  const disc=+document.getElementById('cDiscount')?.value||0;
  const fee=+document.getElementById('cFee')?.value||0;
  const tot=sub-disc+fee;
  if(document.getElementById('cartTotal')) document.getElementById('cartTotal').textContent=fmt(tot);
  return tot;
}
function submitSale(){
  if(!cart.length){toast('Cart is empty');return;}
  const storeId = cart[0].storeId;
  const disc=+val('cDiscount')||0, fee=+val('cFee')||0;
  const total = cart.reduce((a,c)=>a+c.sellPrice*c.qty,0)-disc+fee;
  const sale = {id:gid(), date:new Date().toISOString(), storeId, items:cart.map(c=>({...c})),
    discount:disc, fee, total, payMethod:document.getElementById('cPay').value, bankName:val('cBankName')||'',
    custName:val('cCustName')||'', custPhone:val('cCustPhone')||'', soldBy:SESSION.fullName};
  cart.forEach(c=>{ const p=DB.products.find(x=>x.id===c.productId); if(p) p.stock=Math.max(0,p.stock-c.qty); });
  DB.sales.push(sale); save();
  cart=[];
  toast('Sale recorded!');
  showReceipt(sale);
  RENDER_sell();
}
function showReceipt(sale){
  const lines = sale.items.map(i=>`${i.name} x${i.qty} = ${fmt(i.sellPrice*i.qty)}`).join('\n');
  const text = `🧾 XBX Online POS Receipt\nStore: ${storeName(sale.storeId)}\nDate: ${new Date(sale.date).toLocaleString()}\n\n${lines}\n\nDiscount: ${fmt(sale.discount)}\nService Fee: ${fmt(sale.fee)}\nTOTAL: ${fmt(sale.total)}\n\nPayment: ${sale.payMethod}${sale.bankName?(' ('+sale.bankName+')'):''}\nCustomer: ${sale.custName||'-'} ${sale.custPhone||''}\nSold by: ${sale.soldBy}\n\nMahadsanid! 🙏`;
  openModal(`<h3>✅ Receipt</h3><pre style="white-space:pre-wrap; font-size:13px; background:var(--card2); padding:14px; border-radius:10px; border:1px solid var(--line)">${escapeHtml(text)}</pre>
  <div class="row" style="margin-top:14px"><button class="btn btn-outline btn-sm" style="width:auto" onclick="closeModal()">Close</button>
  <button class="btn btn-good btn-sm" style="width:auto" onclick="sendWhatsApp('${encodeURIComponent(text)}','${escapeHtml(sale.custPhone)}')">📲 Send WhatsApp</button></div>`);
}
function sendWhatsApp(textEnc,phone){
  const num = (phone||DB.settings.whatsapp||'').replace(/[^0-9]/g,'');
  const url = num? `https://wa.me/${num}?text=${textEnc}` : `https://wa.me/?text=${textEnc}`;
  window.open(url,'_blank');
}

function transferForm(pid){
  const p=DB.products.find(x=>x.id===pid);
  openModal(`<h3>Transfer: ${escapeHtml(p.name)}</h3>
  <div class="field"><label>Quantity (max ${p.stock})</label><input id="tQty" type="number" max="${p.stock}" value="1"></div>
  <div class="field"><label>To Store</label><select id="tTo">${DB.stores.filter(s=>s.id!==p.storeId).map(s=>`<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('')}</select></div>

}
function doTransfer(pid){
  const p=DB.products.find(x=>x.id===pid);
  const qty=Math.min(+val('tQty')||0, p.stock);
  const toId=document.getElementById('tTo').value;
  if(qty<=0){toast('Invalid quantity');return;}
  p.stock-=qty;
  let dest = DB.products.find(x=>x.name.toLowerCase()===p.name.toLowerCase() && x.storeId===toId);
  if(dest) dest.stock+=qty; else DB.products.push({...p,id:gid(),storeId:toId,stock:qty});
  DB.transfers.push({id:gid(),product:p.name,from:p.storeId,to:toId,qty,date:new Date().toISOString()});
  save(); closeModal(); toast('Transferred'); RENDER_transfers();
}

function saveReturn(){
  const p=DB.products.find(x=>x.id===document.getElementById('rtProd').value);
  const qty=+val('rtQty')||0;
  if(!p||qty<=0){toast('Invalid');return;}
  p.stock+=qty;
  DB.returns.push({id:gid(),product:p.name,qty,reason:val('rtReason'),storeId:p.storeId,date:new Date().toISOString()});
  save(); closeModal(); toast('Returned — stock restored'); RENDER_returns();
}

/* ============================= REPORTS ============================= */
function RENDER_reports(){
  const ids=myStoreIds();
  const sales=DB.sales.filter(s=>ids.includes(s.storeId));
  document.getElementById('content').innerHTML = `
  <div class="row between" style="margin-bottom:14px"><div class="section-title">Sales Report (${sales.length})</div><button class="btn btn-sm" style="width:auto" onclick="downloadCSV(sales,'sales_report')">⬇ Download CSV</button></div>
  <div class="tablewrap"><table><thead><tr><th>Date</th><th>Store</th><th>Total</th><th>Discount</th><th>Pay</th><th>Customer</th></tr></thead><tbody>
  ${sales.slice().reverse().map(s=>`<tr><td>${new Date(s.date).toLocaleString()}</td><td>${storeName(s.storeId)}</td><td>${fmt(s.total)}</td><td>${fmt(s.discount)}</td><td>${s.payMethod}</td><td>${escapeHtml(s.custName||'-')}</td></tr>`).join('')||'<tr><td colspan="6" class="empty">No data</td></tr>'}
  </tbody></table></div>`;
}
function downloadCSV(arr,name){
  if(!arr.length){toast('No data');return;}
  const flat = arr.map(s=> typeof s==='object' ? {...s, items: s.items?JSON.stringify(s.items):undefined} : s);
  const headers = Object.keys(flat[0]);
  const csv = [headers.join(',')].concat(flat.map(r=>headers.map(h=>`"${(r[h]??'').toString().replace(/"/g,'""')}"`).join(','))).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name+'.csv'; a.click();
}

/* ============================= SHEET DATA ============================= */
const SHEETS = {Stores:'stores',Products:'products','Buy Product':'buyProducts',Users:'users',Sales:'sales',Transfers:'transfers','Credit Customer':'creditCustomers',Debit:'debits',Returns:'returns',Refreshment:'refreshments'};
function RENDER_sheetdata(){
  let h = `<div class="section-title">🗂️ Sheet Data</div><div style="margin-bottom:16px">`;
  Object.keys(SHEETS).forEach(k=> h+=`<span class="chip ${sheetTab===k?'active':''}" onclick="sheetTab='${k}';RENDER_sheetdata();">${k} (${DB[SHEETS[k]].length})</span>`);
  h+=`</div>`;
  const arr = DB[SHEETS[sheetTab]];
  if(!arr.length){ h+='<div class="empty">No rows in this sheet</div>'; }
  else{
    const cols = Array.from(new Set(arr.flatMap(o=>Object.keys(o)))).filter(c=>!['items','image','photo'].includes(c));
    h+=`<div class="row between" style="margin-bottom:10px"><div></div><button class="btn btn-sm" style="width:auto" onclick="downloadCSV(DB['${SHEETS[sheetTab]}'],'${sheetTab}')">⬇ Download Excel/CSV</button></div>`;
    h+='<div class="tablewrap"><table><thead><tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'<th>Action</th></tr></thead><tbody>';
    arr.forEach((row,i)=>{ h+='<tr>'+cols.map(c=>`<td>${escapeHtml(String(row[c]??'-')).slice(0,40)}</td>`).join('')+`<td><button class="btn btn-sm btn-danger" onclick="delSheetRow(${i})">Delete</button></td></tr>`; });
    h+='</tbody></table></div>';
  }
  document.getElementById('content').innerHTML = h;
}
let sheetTab='Stores';
function delSheetRow(i){ if(!confirm('Delete this row?'))return; DB[SHEETS[sheetTab]].splice(i,1); save(); RENDER_sheetdata(); }
